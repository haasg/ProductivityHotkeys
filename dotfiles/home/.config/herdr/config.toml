[keys]
prefix = "ctrl+space"
focus_pane_left  = "prefix+h"
focus_pane_down  = "prefix+j"
focus_pane_up    = "prefix+k"
focus_pane_right = "prefix+l"
split_horizontal = "prefix+minus"       # split down / stacked (wezterm's -)
split_vertical    = "prefix+backslash"  # split right / side-by-side (wezterm's \)
new_tab   = "prefix+c"
close_tab = "prefix+ampersand"
workspace_picker = "prefix+w"
next_agent     = "ctrl+n"   # cycle to next agent (direct, no prefix)
previous_agent = "ctrl+h"   # cycle to previous agent (direct, no prefix)
goto             = "prefix+g"
copy_mode  = "prefix+y"  # herdr's copy-mode entry key; copy-mode's own internal keys (v/space select, y/Enter copy, q/Esc cancel) aren't configurable

# --- workspace / worktree management ---
# workspace_picker (prefix+w) opens a searchable list; use arrow keys / navigate mode (g) to move within it.
# Cmd+H / Cmd+N are mapped to these in wezterm.lua (WezTerm translates Cmd -> this prefix seq,
# since the Cmd/super modifier can't travel through a normal terminal input stream).
previous_workspace = "prefix+shift+h"   # cycle to previous workspace  (user-facing key: Cmd+H)
next_workspace     = "prefix+shift+l"   # cycle to next workspace      (user-facing key: Cmd+N)
open_worktree      = "prefix+shift+o"   # browse & reopen an existing worktree as a workspace
remove_worktree    = "prefix+shift+x"   # remove the focused worktree (asks to confirm; leaves the git branch behind)

# New worktree (auto-generated branch) of the focused workspace's repo, then start claude in it.
# Like the desktop app's "new worktree" button. Repo is inferred from whatever workspace is focused.
[[keys.command]]
key = "prefix+shift+c"
type = "shell"
command = "P=$(herdr worktree create --focus --json | python3 -c 'import sys,json;print(json.load(sys.stdin)[\"result\"][\"root_pane\"][\"pane_id\"])'); herdr pane run \"$P\" claude"

[theme]
name = "tokyo-night"
auto_switch = false
